# Roomify dev environment – backend (Spring Boot) + frontend (Vite)
# Run: docker compose up --build
# Then open http://localhost:5173 (frontend proxies /api to backend)

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - maven-cache:/root/.m2
    environment:
      - SPRING_PROFILES_ACTIVE=
    # Keep H2 in-memory for dev; no DB container needed

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules  # use container node_modules, not host
    environment:
      - API_PROXY_TARGET=http://backend:8080
    depends_on:
      - backend

volumes:
  maven-cache:
